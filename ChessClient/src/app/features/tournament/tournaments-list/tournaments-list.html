<p-table [value]="tournaments.value() ?? []">
  <ng-template pTemplate="header">
    <tr>
      <th>Name</th>
      <th>Location</th>
      <th>Status</th>
      <th>Current round</th>
      <th>Women only</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-tournament>
    <tr>
      <td>{{ tournament.name }}</td>
      <td>{{ tournament.location }}</td>
      <td>{{ tournament.status }}</td>
      <td>{{ tournament.currentRound }}</td>
      <td>{{ tournament.womenOnly ? 'Oui' : 'Non' }}</td>
    </tr>
  </ng-template>
</p-table>

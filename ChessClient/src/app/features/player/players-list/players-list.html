<p-table [value]="players.value() ?? []">
  <ng-template pTemplate="header">
    <tr>
      <th>Pseudo</th>
      <th>Email</th>
      <th>Elo</th>
      <th>Genre</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-player>
    <tr>
      <td>{{ player.pseudo }}</td>
      <td>{{ player.email }}</td>
      <td>{{ player.elo }}</td>
      <td>{{ player.genre }}</td>
    </tr>
  </ng-template>
</p-table>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Un jeu de Memory réalisé en JavaScript. Retrouvez toutes les paires !">
    <title>Memory Game</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <h1>Memory Game</h1>
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-label">Tentatives</span>
                    <span id="moves-count" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Paires</span>
                    <span id="pairs-count" class="stat-value">0/8</span>
                </div>
            </div>
        </header>

        <section id="game-grid" class="game-grid">
            <!-- Les cartes seront générées dynamiquement par le JS -->
        </section>

        <footer class="controls">
            <button id="reset-btn" class="btn-primary">Nouvelle Partie</button>
        </footer>
    </main>

    <div id="win-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Félicitations ! 🎉</h2>
            <p>Vous avez trouvé toutes les paires en <span id="final-moves">0</span> tentatives.</p>
            <button id="modal-reset-btn" class="btn-primary">Rejouer</button>
        </div>
    </div>
</body>

</html>

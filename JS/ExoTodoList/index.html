<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Une application To-Do List moderne et performante en JavaScript.">
    <title>Modern To-Do List</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-bg"></div>
    
    <main class="app-container">
        <header class="app-header">
            <h1>Mes Tâches</h1>
            <p class="subtitle">Organisez votre journée avec style</p>
        </header>

        <section class="form-section">
            <form id="todo-form" class="todo-form">
                <div class="form-group">
                    <label for="task-name">Nom de la tâche <span class="required">*</span></label>
                    <input type="text" id="task-name" placeholder="Ex: Apprendre le JavaScript" required>
                </div>

                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="2" placeholder="Détails de la tâche..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-deadline">Date limite</label>
                        <input type="date" id="task-deadline">
                    </div>
                </div>

                <button type="submit" id="add-task-btn" class="btn-add">
                    <span class="icon">+</span> Ajouter la tâche
                </button>
            </form>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>À faire</h2>
                <button id="clear-all" class="btn-clear">Tout effacer</button>
            </div>
            
            <ul id="todo-list" class="todo-list">
                <!-- Les tâches seront ajoutées ici -->
            </ul>

            <div id="empty-state" class="empty-state">
                <div class="empty-icon">📝</div>
                <p>Aucune tâche pour le moment. Commencez par en ajouter une !</p>
            </div>
        </section>
    </main>

    <template id="task-template">
        <li class="task-item">
            <div class="task-content">
                <div class="task-main">
                    <h3 class="task-title"></h3>
                    <p class="task-description"></p>
                </div>
                <div class="task-footer">
                    <span class="task-date"></span>
                    <span class="task-status"></span>
                </div>
            </div>
            <div class="task-actions">
                <button class="btn-complete" title="Marquer comme terminé">✓</button>
                <button class="btn-delete" title="Supprimer">✕</button>
            </div>
        </li>
    </template>
</body>
</html>
